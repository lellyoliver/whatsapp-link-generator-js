<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulário de contato</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">
            Solicitação de evento
        </h1>

        <form id="formContato" class="space-y-5">

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                    Nome:
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    required
                    placeholder="Digite seu nome"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                >
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                    Telefone:
                </label>

                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    required
                    placeholder="Exemplo: 5511999999999"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                >
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    E-mail:
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="email@exemplo.com"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                >
            </div>

            <div>
                <label for="media" class="block text-sm font-medium text-gray-700 mb-1">
                    Quantidade de pessoas:
                </label>

                <input
                    type="number"
                    id="media"
                    name="media"
                    required
                    min="1"
                    placeholder="Digite a quantidade"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                >
            </div>

            <div>
                <label for="date" class="block text-sm font-medium text-gray-700 mb-1">
                    Data do evento:
                </label>

                <input
                    type="date"
                    id="date"
                    name="date"
                    required
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                >
            </div>

            <button
                type="submit"
                id="btnSubmit"
                class="w-full rounded-lg bg-green-600 px-4 py-3 font-semibold text-white transition hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-300"
            >
                Enviar pelo WhatsApp
            </button>

        </form>

    </div>

    <script src="js/index.js"></script>
</body>
</html>
